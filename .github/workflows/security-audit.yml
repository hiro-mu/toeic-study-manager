name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit and capture report
        id: audit
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit-report.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Fail on high or critical vulnerabilities
        if: steps.audit.outputs.status != '0'
        run: |
          echo "High or critical vulnerabilities detected. See npm-audit-report artifact."
          exit 1
