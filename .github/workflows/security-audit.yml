name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (all levels)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit and capture report
        id: audit
        run: |
          set +e
          npm audit --audit-level=low --json > npm-audit-report.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Classify audit result
        id: classify
        env:
          AUDIT_STATUS: ${{ steps.audit.outputs.status }}
        run: |
          node <<'EOF'
          const fs = require('fs');

          const outputPath = process.env.GITHUB_OUTPUT;
          const status = process.env.AUDIT_STATUS ?? '';

          let shouldFail = 'false';
          let failureKind = 'none';
          let summary = 'No vulnerabilities detected.';

          if (status !== '0') {
            shouldFail = 'true';
            failureKind = 'infra-error';
            summary = 'npm audit failed for a non-vulnerability reason.';

            try {
              const raw = fs.readFileSync('npm-audit-report.json', 'utf8');
              const report = JSON.parse(raw);
              const low = report?.metadata?.vulnerabilities?.low ?? 0;
              const moderate = report?.metadata?.vulnerabilities?.moderate ?? 0;
              const high = report?.metadata?.vulnerabilities?.high ?? 0;
              const critical = report?.metadata?.vulnerabilities?.critical ?? 0;
              const total = low + moderate + high + critical;

              if (total > 0) {
                failureKind = 'vulnerabilities';
                summary = `Detected vulnerabilities - low: ${low}, moderate: ${moderate}, high: ${high}, critical: ${critical}.`;
              } else if (report?.error?.summary) {
                summary = report.error.summary;
              }
            } catch (error) {
              summary = `Failed to parse npm-audit-report.json: ${error.message}`;
            }
          }

          fs.appendFileSync(outputPath, `should_fail=${shouldFail}\n`);
          fs.appendFileSync(outputPath, `failure_kind=${failureKind}\n`);
          fs.appendFileSync(outputPath, `summary=${summary.replace(/\r?\n/g, ' ')}\n`);
          EOF

      - name: Fail on any vulnerabilities
        if: steps.classify.outputs.should_fail == 'true'
        run: |
          if [ "${{ steps.classify.outputs.failure_kind }}" = "vulnerabilities" ]; then
            echo "Vulnerabilities detected. ${{ steps.classify.outputs.summary }}"
          else
            echo "npm audit could not be evaluated reliably. ${{ steps.classify.outputs.summary }}"
          fi
          exit 1
