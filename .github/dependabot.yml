version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "00:00"
      timezone: UTC
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore(deps)
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "00:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore(deps)
